  - "EM ANÁLISE"
  - "PENDENTE"
  - "INDEFERIDO"
  - "CONCLUÍDO"
  - "LICENCIADO"
  - "NOTIFICAÇÃO"
  - "AGUARD VISTORIA"
  - "AGUARD REGULARIZAÇÃO"
